name: CI

# Fast sanity checks on every push and pull request: confirm composer.json is
# valid and that every PHP file parses. Mirrors the discipline of running
# `php -l` before packaging.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Lint all PHP files
        run: |
          set -e
          ERR=0
          while IFS= read -r -d '' f; do
            if ! php -l "$f" > /dev/null; then
              echo "::error file=$f::php -l failed"
              ERR=1
            fi
          done < <(find src public -name '*.php' -print0)
          if [ "$ERR" -ne 0 ]; then
            echo "PHP lint failed."
            exit 1
          fi
          echo "All PHP files passed php -l."
